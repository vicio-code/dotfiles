"$schema" = 'https://starship.rs/config-schema.json'

# ============= Prompt Format =============
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$nodejs\
$python\
$time\
$cmd_duration\
$line_break\
$character"""

# ============= Character (Prompt Symbol) =============
[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# ============= Directory =============
[directory]
style = "blue"
truncation_length = 3           
truncate_to_repo = true  
read_only = " 󰌾" 

# ============= Time =============
[time]
disabled = false
format = '[$time]($style) '
style = "bright-black"
time_format = "%T"

# ============= Command Duration =============
[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 500

# ============= Git Branch =============
[git_branch]
format = "[$branch]($style)"
style = "bright-black"

# ============= Git Status =============
[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "≡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

# ============= Git State =============
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# ============= Python =============
[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []

# ============= Node.js =============
[nodejs]
format = "[$symbol($version )]($style)"
style = "bright-black"
symbol = "⬢ "
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "jsx"]
detect_files = ["package.json", ".node-version"]

# ============= Username =============
[username]
format = "[$user]($style) in "
style_user = "bright-yellow"
style_root = "bright-red"
show_always = false

# ============= Hostname =============
[hostname]
format = "[$hostname]($style) in "
style = "bright-green"
ssh_only = true
